apiVersion: apps/v1
kind: Deployment
metadata:
  name: sec-copilot-ui
spec:
  template:
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: cloud.google.com/gke-accelerator
                    operator: DoesNotExist

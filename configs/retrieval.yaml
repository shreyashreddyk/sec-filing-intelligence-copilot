chunking:
  strategy: section_aware_placeholder
  target_tokens: 500
  overlap_tokens: 75
  preserve_section_headers: true

index:
  collection_name: sec_semis_v1_hybrid_v3
  persist_directory: artifacts/chroma
  distance_space: cosine
  default_mode: rebuild

embedding:
  provider: sentence_transformers_local
  device: auto
  model_name: sentence-transformers/all-MiniLM-L6-v2
  batch_size: 32
  normalize_embeddings: true
  subchunk_tokens: 200
  subchunk_overlap_tokens: 40

retrieval:
  dense_subchunk_top_k: 24
  dense_top_k: 8
  bm25_top_k: 8
  fused_top_k_before_rerank: 12
  generation_context_top_k: 4

bm25:
  preprocessing: sec_regex_v1

fusion:
  method: rrf
  rrf_k: 60

prompting:
  prompt_name: grounded_answer_v3
  prompt_version: v3_hybrid_reranked_grounded
  max_context_tokens: 2400

provider:
  default_name: openai
  openai_model: gpt-4.1-mini

reranking:
  enabled: true
  required_for_generation: true
  model_name: cross-encoder/ms-marco-MiniLM-L-6-v2
  rerank_top_k: 8
  batch_size: 8
  device: auto

abstention:
  weak_top_rerank_score_threshold: 0.60
  supporting_chunk_rerank_score_threshold: 0.45
  min_supporting_chunks: 2

grounding:
  citations_must_come_from_final_context: true

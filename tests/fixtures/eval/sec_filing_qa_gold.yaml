      - sec_0000002488_000000248826000018_s07_c0006
    required_citation_chunk_ids:
      - sec_0001045810_000104581026000021_s07_c0008
      - sec_0000002488_000000248826000018_s07_c0006
    reference_answer: >
      NVIDIA points to Hopper and Blackwell demand behind its Data Center growth,
      while AMD highlights EPYC CPUs and Instinct or MI300 accelerators as the main drivers of its data center expansion.

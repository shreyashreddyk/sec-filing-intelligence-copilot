apiVersion: batch/v1
kind: CronJob
metadata:
  name: sec-copilot-corpus-refresh
  labels:
    app.kubernetes.io/name: sec-copilot-corpus-refresh
    app.kubernetes.io/component: refresh
    app.kubernetes.io/part-of: sec-filing-intelligence-copilot
spec:
  # Default cadence is weekly, but the CronJob is suspended by default for safe manual rollout.
  # Create the first deployed bootstrap Job from this CronJob so the Job inherits overlay image names and tags.
  schedule: "0 7 * * 1"
  suspend: true
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app.kubernetes.io/name: sec-copilot-corpus-refresh
            app.kubernetes.io/component: refresh
            app.kubernetes.io/part-of: sec-filing-intelligence-copilot
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            runAsGroup: 999
            fsGroup: 2000
            fsGroupChangePolicy: OnRootMismatch
          containers:
            - name: refresh
              image: sec-copilot-api:latest
              imagePullPolicy: IfNotPresent
              command: ["python", "-m", "sec_copilot.ops.corpus_refresh"]
              envFrom:
                - configMapRef:
                    name: sec-copilot-config
                - secretRef:
                    name: sec-copilot-secrets
              volumeMounts:
                - name: state
                  mountPath: /var/lib/sec-copilot
              resources:
                requests:
                  cpu: "500m"
                  memory: "2Gi"
                limits:
                  cpu: "1500m"
                  memory: "6Gi"
          volumes:
            - name: state
              persistentVolumeClaim:
                claimName: sec-copilot-state

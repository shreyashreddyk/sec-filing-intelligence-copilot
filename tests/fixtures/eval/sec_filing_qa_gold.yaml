      form_types: [10-K]
      filing_date_from: "2026-01-23"
      filing_date_to: "2026-01-23"
    expected_abstention: false
    gold_chunk_ids:
      - sec_0000050863_000005086326000011_s07_c0009
    required_citation_chunk_ids:
      - sec_0000050863_000005086326000011_s07_c0009
    reference_answer: >
      Intel reports that Intel Foundry posted a $13.4 billion operating loss in FY2025
      while it continued to invest in process technology and fab capacity.
    reference_key_points:
      - Intel Foundry operating loss is reported as $13.4 billion.
      - The filing links the loss to continued investment in process technology and fabs.
    tags: [full]

  - example_id: compare_nvda_data_center_growth
    question: How did NVIDIA's Data Center revenue change from FY2025 to FY2026?
    category: cross_period_comparison
    filters:
      tickers: [NVDA]
      form_types: [10-K]
      filing_date_from: "2025-02-26"
      filing_date_to: "2026-02-25"
    expected_abstention: false
    gold_chunk_ids:
      - sec_0001045810_000104581025000023_s07_c0007
      - sec_0001045810_000104581026000021_s07_c0008
    required_citation_chunk_ids:
      - sec_0001045810_000104581025000023_s07_c0007
      - sec_0001045810_000104581026000021_s07_c0008
    reference_answer: >
      NVIDIA's Data Center revenue rose from $47.5 billion in FY2025 to $115.2 billion in FY2026,
      with the later year driven by continued AI platform demand including Hopper and Blackwell systems.
    reference_key_points:
      - FY2025 Data Center revenue is $47.5 billion.
      - FY2026 Data Center revenue is $115.2 billion.
      - The filing attributes FY2026 growth to AI platform demand including Hopper and Blackwell.
    tags: [full, ci_smoke]

  - example_id: compare_amd_data_center_growth
    question: How did AMD's Data Center segment revenue change from FY2024 to FY2025?
    category: cross_period_comparison
    filters:
      tickers: [AMD]
      form_types: [10-K]
      filing_date_from: "2025-02-05"
      filing_date_to: "2026-02-04"
    expected_abstention: false
    gold_chunk_ids:
      - sec_0000002488_000000248825000012_s07_c0007
      - sec_0000002488_000000248826000018_s07_c0006
    required_citation_chunk_ids:
      - sec_0000002488_000000248825000012_s07_c0007
      - sec_0000002488_000000248826000018_s07_c0006
    reference_answer: >
      AMD's Data Center segment revenue increased from $6.5 billion in FY2024 to $12.6 billion in FY2025
      as EPYC CPUs and Instinct accelerators drove stronger demand.
    reference_key_points:
      - FY2024 Data Center segment revenue is $6.5 billion.
      - FY2025 Data Center segment revenue is $12.6 billion.
      - EPYC and Instinct products are named as demand drivers.
    tags: [full]

  - example_id: compare_intel_foundry_loss
    question: Did Intel Foundry's operating loss improve or worsen from FY2024 to FY2025?
    category: cross_period_comparison
    filters:
      tickers: [INTC]
      form_types: [10-K]
      filing_date_from: "2025-01-31"
      filing_date_to: "2026-01-23"
    expected_abstention: false
    gold_chunk_ids:
      - sec_0000050863_000005086325000009_s07_c0008
      - sec_0000050863_000005086326000011_s07_c0009
    required_citation_chunk_ids:
      - sec_0000050863_000005086325000009_s07_c0008
      - sec_0000050863_000005086326000011_s07_c0009
    reference_answer: >
      Intel Foundry's operating loss worsened, increasing from $11.6 billion in FY2024
      to $13.4 billion in FY2025 as Intel kept investing in process technology and fabs.
    reference_key_points:
      - FY2024 Intel Foundry operating loss is $11.6 billion.
      - FY2025 Intel Foundry operating loss is $13.4 billion.
      - The later-year loss reflects continued process and fab investment.
    tags: [full, ci_smoke]

  - example_id: synth_nvda_amd_ai_demand

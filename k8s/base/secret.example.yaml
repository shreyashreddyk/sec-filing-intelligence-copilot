apiVersion: v1
kind: Secret
metadata:
  name: sec-copilot-secrets
  labels:
    app.kubernetes.io/name: sec-copilot
    app.kubernetes.io/part-of: sec-filing-intelligence-copilot
type: Opaque
stringData:
  # Replace with a real SEC-compliant user agent before applying to a cluster.
  SEC_USER_AGENT: "Your Name your.email@example.com"
  # Replace with a real key for live OpenAI answers, or remove if you want mock fallback only.
  OPENAI_API_KEY: "replace-me"
  # Optional. Only needed when you use gated Hugging Face assets.
  HF_TOKEN: ""

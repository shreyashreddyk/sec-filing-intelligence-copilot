apiVersion: batch/v1
kind: Job
metadata:
  name: sec-copilot-corpus-refresh-manual-template
  labels:
    app.kubernetes.io/name: sec-copilot-corpus-refresh
    app.kubernetes.io/component: refresh
    app.kubernetes.io/part-of: sec-filing-intelligence-copilot
spec:
  # Prefer `kubectl create job --from=cronjob/sec-copilot-corpus-refresh ...` in deployed clusters.
  # That one-off Job inherits any overlay-specific image name and tag rewrites automatically.
  backoffLimit: 1
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sec-copilot-corpus-refresh
        app.kubernetes.io/component: refresh
        app.kubernetes.io/part-of: sec-filing-intelligence-copilot
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 2000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: refresh
          image: sec-copilot-api:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "sec_copilot.ops.corpus_refresh"]
          envFrom:
            - configMapRef:
                name: sec-copilot-config
            - secretRef:
                name: sec-copilot-secrets
          volumeMounts:
            - name: state
              mountPath: /var/lib/sec-copilot
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "1500m"
              memory: "6Gi"
      volumes:
        - name: state
          persistentVolumeClaim:
            claimName: sec-copilot-state

examples:
  - example_id: fact_nvda_h20_license
    question: What H20 export license restrictions does NVIDIA describe in its FY2026 10-K?
    category: fact_lookup
    filters:
      tickers: [NVDA]
      form_types: [10-K]
      filing_date_from: "2026-02-25"
      filing_date_to: "2026-02-25"
    expected_abstention: false
    gold_chunk_ids:
      - sec_0001045810_000104581026000021_s02_c0006
    required_citation_chunk_ids:
      - sec_0001045810_000104581026000021_s02_c0006
    reference_answer: >
      NVIDIA says the U.S. government required licenses for exports of H20 and similar chips to China,
      which reduced demand and left the company with excess inventory and purchase obligations.
    reference_key_points:
      - The filing says H20 and similar chips shipped to China require export licenses.
      - NVIDIA ties the restriction to reduced demand and excess inventory or purchase obligations.
    tags: [full, ci_smoke]

  - example_id: fact_amd_fabless_model
    question: How does AMD describe its manufacturing model in the FY2024 10-K?
    category: fact_lookup
    filters:
      tickers: [AMD]
      form_types: [10-K]
      filing_date_from: "2025-02-05"
      filing_date_to: "2025-02-05"
    expected_abstention: false
    gold_chunk_ids:
      - sec_0000002488_000000248825000012_s02_c0003
    required_citation_chunk_ids:
      - sec_0000002488_000000248825000012_s02_c0003
    reference_answer: >
      AMD describes itself as a fabless semiconductor company that depends on third-party foundries,
      especially TSMC, along with outside assembly and test partners.
    reference_key_points:
      - AMD says it is fabless rather than internally manufacturing its wafers.
      - AMD relies on third-party foundries and outsourced assembly or test partners.
    tags: [full, ci_smoke]

  - example_id: fact_intel_foundry_loss
    question: What operating loss does Intel report for Intel Foundry in the FY2025 10-K?
    category: fact_lookup

apiVersion: apps/v1
kind: Deployment
metadata:
  name: sec-copilot-ui
  labels:
    app.kubernetes.io/name: sec-copilot-ui
    app.kubernetes.io/component: ui
    app.kubernetes.io/part-of: sec-filing-intelligence-copilot
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sec-copilot-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sec-copilot-ui
        app.kubernetes.io/component: ui
        app.kubernetes.io/part-of: sec-filing-intelligence-copilot
    spec:
      containers:
        - name: ui
          image: sec-copilot-ui:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8501
          envFrom:
            - configMapRef:
                name: sec-copilot-config
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"

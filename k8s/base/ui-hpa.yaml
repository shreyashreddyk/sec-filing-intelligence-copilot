apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sec-copilot-ui
  labels:
    app.kubernetes.io/name: sec-copilot-ui
    app.kubernetes.io/component: ui
    app.kubernetes.io/part-of: sec-filing-intelligence-copilot
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sec-copilot-ui
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
